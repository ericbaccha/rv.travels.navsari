<style>

/* NAVBAR */
.navbar{
position:fixed;width:100%;top:0;
display:flex;justify-content:space-between;align-items:center;
padding:15px 25px;
background:rgba(255,255,255,0.7);

.logo{display:flex;gap:10px;align-items:center}

.menu{display:flex;gap:25px}
.menu a{color:#1e40af;text-decoration:none;font-weight:500}

/* HERO */
.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
display:flex;align-items:center;justify-content:center;
text-align:center;color:white;position:relative;
}
.hero::before{
content:'';position:absolute;inset:0;background:rgba(0,0,0,0.6);
}
.hero-content{position:relative;max-width:700px;animation:fadeUp 1s}
.btn{
background:#F59E0B;padding:14px 25px;border-radius:10px;

}

/* SECTION */
.section{padding:80px 20px;max-width:1100px;margin:auto}
.grid{display:grid;gap:25px}
@media(min-width:768px){.grid{grid-template-columns:repeat(3,1fr)}}

/* CARD */
.card{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:25px;border-radius:16px;
transition:0.3s;
}
.card:hover{transform:translateY(-10px)}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;width:65px;height:65px;
display:flex;align-items:center;justify-content:center;
border-radius:50%;color:white;font-size:28px;
animation:pulse 2s infinite;
}

@keyframes fadeUp{from{opacity:0;transform:translateY(40px)}to{opacity:1}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
</style>
