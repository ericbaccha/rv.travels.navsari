<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RV Travels</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#f5f7fb;color:#1f2937;}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
padding:15px 25px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
z-index:1000;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
padding:80px 8%;
color:white;
background:url('https://www.image2url.com/r2/default/images/1776075695647-03aa59e1-4032-46c7-ad1f-663eb423f872.jpg') center/cover no-repeat;
position:relative;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
top:0;
left:0;
}

.hero-content{
position:relative;
z-index:2;
max-width:600px;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:16px;
line-height:1.6;
}

/* SECTION */
.section{
padding:60px 20px;
max-width:1100px;
margin:auto;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
}

/* CONTACT */
.contact{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
max-width:400px;
margin:auto;
}

/* ANIMATION */
.fade{
opacity:0;
transform:translateY(30px);
transition:0.6s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<div class="navbar">RV Travels</div>

<section class="hero">
<div class="hero-content fade">
<h1>Premium Car Rental Service</h1>
<p>20+ Years of Trusted Service | Clean Cars | On-Time Guarantee</p>
</div>
</section>

<section class="section">
<div class="grid">
<div class="card fade">Local Travel</div>
<div class="card fade">Airport Transfer</div>
<div class="card fade">Outstation</div>
</div>
</section>

<section class="section">
<div class="contact fade">
<h2>Contact</h2>
<p>Call or WhatsApp us to book</p>
</div>
</section>

<script>
const items=document.querySelectorAll('.fade');

const observer=new IntersectionObserver((entries)=>{
entries.forEach(e=>{
if(e.isIntersecting){
e.target.classList.add('show');
}
});
});

items.forEach(el=>observer.observe(el));
</script>

</body>
</html>
