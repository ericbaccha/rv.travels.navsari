/* NAVBAR */
.navbar{

}

display:inline-block;

padding:12px 20px;

font-weight:600;
}
.call{background:#1e40af;color:white}
.whatsapp-btn{background:#25D366;color:white}

display:flex;align-items:center;justify-content:center;

/* MOBILE */
@media(max-width:768px){
